// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.7.2'
        classpath 'com.google.gms:google-services:4.4.2'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

// Fix duplicate Kotlin classes: exclude deprecated kotlin-stdlib-jdk7 and kotlin-stdlib-jdk8
configurations.all {
    resolutionStrategy {
        force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"
    }
    eachDependency { details ->
        if (details.requested.group == 'org.jetbrains.kotlin') {
            if (details.requested.name.contains('jdk7') || details.requested.name.contains('jdk8')) {
                details.useTarget "org.jetbrains.kotlin:kotlin-stdlib:${details.requested.version}"
            }
        }
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
