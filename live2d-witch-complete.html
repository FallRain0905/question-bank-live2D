<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Witch Live2D - Complete</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #222; }
        #container { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
        canvas { display: block; }
        #ui { position: fixed; top: 20px; right: 20px; z-index: 100; background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); max-width: 280px; }
        h2 { margin: 0 0 10px 0; font-size: 16px; color: #333; }
        .btn { display: block; margin: 10px 0; padding: 12px 20px; background: #9b59b6; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #8e44ad; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #log { background: #1e1e1e; color: #0f0; padding: 10px; border-radius: 5px; margin-top: 10px; max-height: 150px; overflow-y: auto; font-family: monospace; font-size: 11px; }
        .status { margin-bottom: 10px; padding: 8px; border-radius: 5px; background: #f8f9fa; font-size: 12px; color: #333; }
        .expression-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .expression-btn { padding: 6px 8px; font-size: 11px; background: #3498db; }
        .expression-btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas"></canvas>
    </div>
    <div id="ui">
        <h2>🧙 Witch Live2D - Complete</h2>
        <div id="status" class="status">等待加载库...</div>
        <button id="loadBtn" class="btn">Load Model</button>
        <button id="resetBtn" class="btn" disabled>Reset Position</button>
        <div class="expression-grid">
            <button class="btn expression-btn" data-expr="normal">😊 正常</button>
            <button class="btn expression-btn" data-expr="mz">😄 美滋滋</button>
            <button class="btn expression-btn" data-expr="x">😄 开心</button>
            <button class="btn expression-btn" data-expr="xx">🤩 大笑</button>
            <button class="btn expression-btn" data-expr="sq">😠 生气</button>
            <button class="btn expression-btn" data-expr="fz">😡 愤怒</button>
            <button class="btn expression-btn" data-expr="yj">😲 惊讶</button>
            <button class="btn expression-btn" data-expr="h">😳 害羞</button>
            <button class="btn expression-btn" data-expr="hdj">🥺 感动</button>
            <button class="btn expression-btn" data-expr="ku">😢 哭</button>
            <button class="btn expression-btn" data-expr="cw">🤔 沉思</button>
            <button class="btn expression-btn" data-expr="zs1">🎭 姿势1</button>
            <button class="btn expression-btn" data-expr="zs2">🎭 姿势2</button>
        </div>
        <div id="log"></div>
    </div>

    <!-- Correct library loading order from N.E.K.O project -->
    <script src="neko/static/libs/live2dcubismcore.min.js"></script>
    <script src="neko/static/libs/live2d.min.js"></script>
    <script src="neko/static/libs/pixi.min.js"></script>
    <script src="neko/static/libs/index.min.js"></script>

    <script>
        let app = null, model = null, loaded = false;

        function log(msg) {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.style.cssText = 'margin: 3px 0; padding: 4px 0; border-bottom: 1px solid #333;';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }

        function updateStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status';
            if (type === 'loading') {
                statusDiv.style.background = '#f39c12';
            } else if (type === 'success') {
                statusDiv.style.background = '#27ae60';
            } else if (type === 'error') {
                statusDiv.style.background = '#e74c3c';
            }
        }

        async function load() {
            try {
                if (loaded) {
                    log('模型已加载，先移除旧模型');
                    if (model) {
                        app.stage.removeChild(model);
                        model.destroy({ children: true });
                        model = null;
                    }
                }

                updateStatus('正在初始化Cubism框架...');
                app = new PIXI.Application({
                    view: document.getElementById('canvas'),
                    width: window.innerWidth,
                    height: window.innerHeight,
                    transparent: true,
                    backgroundAlpha: 0,
                    autoStart: true,
                    resolution: window.devicePixelRatio || 1
                });

                log('PIXI应用创建成功');
                updateStatus('正在加载魔女模型...');

                document.getElementById('resetBtn').disabled = true;
                document.querySelectorAll('.expression-btn').forEach(btn => {
                    btn.disabled = true;
                });

                log('开始加载魔女模型...');
                const modelPath = 'live2d/model/witch/魔女.model3.json';
                log(`模型路径: ${modelPath}`);

                if (typeof PIXI.live2d.Live2DModel !== 'function') {
                    throw new Error('PIXI.live2d.Live2DModel不可用，请检查脚本加载顺序');
                }

                // 添加缓存破坏参数，强制重新加载
                const cacheBuster = `?t=${Date.now()}`;
                model = await PIXI.live2d.Live2DModel.from(modelPath + cacheBuster, {
                    autoFocus: false
                });

                log('模型加载成功！');
                updateStatus('正在配置模型...');

                // 设置模型属性
                model.x = window.innerWidth / 2;
                model.y = window.innerHeight * 0.85;
                model.anchor.set(0.5, 0.5);
                model.scale.set(0.3);
                model.alpha = 1;
                model.visible = true;
                model.renderable = true;

                // 添加到舞台
                app.stage.addChild(model);

                // 启用交互
                model.interactive = true;
                model.buttonMode = true;

                // 拖拽功能
                let isDragging = false;
                let dragStartPos = { x: 0, y: 0 };
                let modelStartPos = { x: 0, y: 0 };

                model.on('pointerdown', (e) => {
                    isDragging = true;
                    dragStartPos = { x: e.data.global.x, y: e.data.global.y };
                    modelStartPos = { x: model.x, y: model.y };
                });

                model.on('pointermove', (e) => {
                    if (!isDragging) return;
                    const deltaX = e.data.global.x - dragStartPos.x;
                    const deltaY = e.data.global.y - dragStartPos.y;
                    model.x = modelStartPos.x + deltaX;
                    model.y = modelStartPos.y + deltaY;
                });

                model.on('pointerup', () => isDragging = false);
                model.on('pointerupoutside', () => isDragging = false);

                // 表情控制函数
                const setExpression = async (exprName) => {
                    try {
                        if (exprName === 'normal') {
                            // 重置为默认表情
                            await model.expression(null);
                            log('✅ 表情已重置为默认状态');
                        } else {
                            // 应用指定的表情
                            await model.expression(exprName);
                            log(`✅ 表情应用成功: ${exprName}`);
                        }
                    } catch (err) {
                        log(`❌ 表情设置失败: ${err.message}`);
                    }
                };

                // 为每个表情按钮添加点击事件
                document.querySelectorAll('.expression-btn').forEach(btn => {
                    const exprName = btn.getAttribute('data-expr');
                    if (exprName) {
                        btn.disabled = false;
                        btn.onclick = () => setExpression(exprName);
                    }
                });

                loaded = true;
                document.getElementById('resetBtn').disabled = false;
                updateStatus('魔女模型加载完成！', 'success');

                log('✅ 模型已添加到舞台，应该可以看到魔女');
                log(`模型尺寸: 宽${model.width}, 高${model.height}`);
                log(`模型位置: x=${model.x}, y=${model.y}`);
                log(`模型缩放: scale=${model.scale.x}`);

                // 检查表情系统 - 使用更可靠的方法
                try {
                    // 详细调试：打印完整的模型设置信息
                    log('🔍 开始检查模型配置...');
                    if (model.internalModel) {
                        const settings = model.internalModel.settings;
                        log('模型设置对象:', settings ? '✅ 存在' : '❌ 不存在');

                        if (settings) {
                            log('设置内容键名:', Object.keys(settings).join(', '));

                            // 检查Expressions配置
                            if (settings.expressions !== undefined) {
                                const expressions = settings.expressions;
                                log(`表情配置: ${Array.isArray(expressions) ? `数组 (长度: ${expressions.length})` : typeof expressions}`);

                                if (Array.isArray(expressions) && expressions.length > 0) {
                                    log(`✅ 表情系统已就绪，发现 ${expressions.length} 个表情:`);
                                    expressions.forEach((expr, index) => {
                                        const exprInfo = typeof expr === 'object' ? `${expr.name}: ${expr.file}` : expr;
                                        log(`  ${index + 1}. ${exprInfo}`);
                                    });

                                    // 测试第一个表情是否可用
                                    const firstExpr = expressions[0]?.name;
                                    if (firstExpr) {
                                        log(`🧪 测试第一个表情: ${firstExpr}...`);
                                        await model.expression(firstExpr);
                                        log('✅ 表情测试成功！');

                                        // 等待2秒后重置
                                        setTimeout(() => {
                                            model.expression(null);
                                            log('✅ 表情已重置为默认');
                                        }, 2000);
                                    }
                                } else {
                                    log('⚠️ 表情系统配置为空或不是数组');
                                    if (expressions === null) {
                                        log('详细: expressions = null');
                                    } else if (expressions === undefined) {
                                        log('详细: expressions = undefined');
                                    } else if (Array.isArray(expressions)) {
                                        log('详细: expressions是空数组');
                                    }
                                }
                            } else {
                                log('⚠️ 表情配置字段不存在');
                            }
                        }
                    } else {
                        log('⚠️ 无法访问模型内部设置信息');
                    }
                } catch (err) {
                    log(`⚠️ 表情系统检查出错: ${err.message}`);
                    console.error('详细错误:', err);
                }

            } catch (err) {
                console.error('模型加载失败:', err);
                updateStatus(`加载失败: ${err.message}`, 'error');
                log(`错误详情: ${err.message}`);
            }
        }

        document.getElementById('loadBtn').onclick = load;
        document.getElementById('resetBtn').onclick = () => {
            if (model && app) {
                model.x = window.innerWidth / 2;
                model.y = window.innerHeight * 0.85;
                model.scale.set(0.3);
                log('模型位置已重置');
            }
        };

        window.onload = () => {
            setTimeout(() => {
                load();
            }, 500);
        };

        // 全局测试函数（可在控制台调用）
        window.testExpressions = async () => {
            if (!model) {
                console.log('模型未加载');
                return;
            }

            const expressions = ['mz', 'x', 'xx', 'sq', 'fz', 'yj', 'h', 'hdj', 'ku', 'cw', 'zs1', 'zs2'];
            console.log('开始测试所有表情...');

            for (let i = 0; i < expressions.length; i++) {
                console.log(`测试表情 ${i + 1}/${expressions.length}: ${expressions[i]}`);
                await model.expression(expressions[i]);
                await new Promise(resolve => setTimeout(resolve, 2000)); // 每个表情显示2秒
            }

            model.expression(null); // 重置
            console.log('表情测试完成');
        };

        // 检查表情参数的实际效果
        window.checkExpressionEffect = async (exprName) => {
            if (!model || !model.internalModel) {
                console.log('模型未加载');
                return;
            }

            console.log(`检查表情: ${exprName}`);

            // 获取当前参数值
            const coreModel = model.internalModel.coreModel;
            const paramCount = coreModel.getParameterCount();
            console.log(`模型总参数数: ${paramCount}`);

            // 获取表情文件内容
            const exprFile = `live2d/model/witch/${exprName}.exp3.json`;
            try {
                const response = await fetch(exprFile);
                const exprData = await response.json();

                console.log(`表情文件内容:`, exprData);
                console.log(`影响的参数:`);

                if (exprData.Parameters) {
                    exprData.Parameters.forEach(param => {
                        console.log(`  参数ID: ${param.Id}, 值: ${param.Value}, 混合模式: ${param.Blend}`);

                        // 获取参数的当前值
                        try {
                            const paramIndex = coreModel.getParameterIndex(param.Id);
                            const currentValue = coreModel.getParameterValueByIndex(paramIndex);
                            const minValue = coreModel.getParameterMinimumByIndex(paramIndex);
                            const maxValue = coreModel.getParameterMaximumByIndex(paramIndex);

                            console.log(`    当前值: ${currentValue}, 范围: [${minValue}, ${maxValue}]`);
                        } catch (e) {
                            console.log(`    无法获取参数详情: ${e.message}`);
                        }
                    });
                }
            } catch (err) {
                console.log(`无法读取表情文件: ${err.message}`);
            }
        };

        window.getExpressionInfo = () => {
            if (!model || !model.internalModel) {
                console.log('模型或内部模型未加载');
                return;
            }

            console.log('=== 表情系统信息 ===');
            console.log('模型配置:', model.internalModel.settings);
            console.log('可用表情:', model.internalModel.settings?.expressions);
            console.log('表情数量:', model.internalModel.settings?.expressions?.length || 0);
            console.log('内部表达式管理器:', model.internalModel.expressionManager);
        };
    </script>
</body>
</html>
